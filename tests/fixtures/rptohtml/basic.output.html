<!DOCTYPE html>
<html>
<head><title>Chat</title></head>
<body>
<div class="message system">
  <div class="name">system</div>
  <div class="content"><p>You are a helpful assistant.</p>
</div>
</div>
<div class="message user">
  <div class="name">Bob</div>
  <div class="content"><p>Hello, <strong>Alice</strong>!</p>
</div>
</div>
<div class="message assistant">
  <div class="name">Alice</div>
  <div class="content"><p>Hi there, Bob! How are you?</p>
</div>
</div>
</body>
</html>
